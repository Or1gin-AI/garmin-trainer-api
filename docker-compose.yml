services:
  postgres:
    image: postgres:18-alpine
    container_name: garmin-trainer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5556}:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG:-latest-dev}
    restart: "no"
    env_file: [.env]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: ["node", "dist/scripts/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy

  app:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG:-latest-dev}
    container_name: garmin-trainer-api
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "127.0.0.1:${APP_PORT:-4001}:4001"
    volumes:
      - ${APP_DATA_DIR:-./data/app}:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["node", "dist/server.js"]

  worker:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG:-latest-dev}
    container_name: garmin-trainer-worker
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ${APP_DATA_DIR:-./data/app}:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["node", "dist/worker/index.js"]
